<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chamoy</title>
    <link type="text/css" rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&icon_names=chat" />
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1990&display=swap" rel="stylesheet">
 </head>
<body>
  <div id="login-screen" class="overlay">
    <div class="card">
      <h2 class="login-title">Ingresar al chat</h2>
      <input id="nameInput" placeholder="Tu nombre" maxlength="30" />
      <input id="passwordInput" type="password" placeholder="Clave de acceso" />
      <button id="enterBtn">Entrar</button>
      <p class="hint">Solicita la clave al creador.</p>
      <p id="loginError" class="error"></p>
    </div>
  </div>

  <div id="chat-screen" class="hidden">
    <header class="topbar">
      <div class="topbar-left">
        <div class="avatar">
          <span class="material-symbols-outlined">
chat
</span></div>
        <div>
          <div class="title">Chamoy</div>
          <div class="subtitle">chat porque si</div>
        </div>
      </div>
      <div class="topbar-right">
        <button id="logoutBtn">Salir</button>
      </div>
    </header>

    <main id="messages" class="messages"></main>

    <footer class="composer">
      <input id="textInput" placeholder="Escribe un mensaje..." />
      
      <button id="sendBtn">Enviar</button>
    </footer>
  </div>
<script src="script.js"></script>
</body>
</html>
